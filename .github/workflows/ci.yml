name: CI

on: workflow_dispatch

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/overleaf-server

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.11.6
      - run: ruff check app/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dev
          platforms: linux/arm64
          load: true
          tags: overleaf-server-dev:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: |
          docker run --rm \
            -e API_KEYS=test-key-123 \
            -e LOG_LEVEL=warning \
            -e USE_TMPFS=false \
            overleaf-server-dev:test \
            python3 -m pytest tests/ -v --tb=short

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

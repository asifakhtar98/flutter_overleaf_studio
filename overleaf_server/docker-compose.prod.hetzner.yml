# =============================================================================
# Production Docker Compose — Hetzner CAX11 (2 ARM vCPU, 4GB RAM)
# =============================================================================
# Usage:
#   IMAGE_TAG=latest docker compose -f docker-compose.prod.hetzner.yml up -d
#
# Resource limits tuned for CAX11. For CAX21 (8GB), use docker-compose.prod.yml
# with WORKERS=4 and MAX_CONCURRENT_COMPILES=4.
# =============================================================================

services:
  api:
    image: ${DOCKERHUB_USERNAME:-yourusername}/overleaf-server:${IMAGE_TAG:-latest}
    container_name: overleaf-server-prod
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - WORKERS=2
      - LOG_LEVEL=info
    deploy:
      resources:
        limits:
          cpus: "1.8"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    shm_size: "2gb"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: overleaf-server-dev
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
    env_file:
      - .env
    environment:
      - LOG_LEVEL=debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # Give /dev/shm more space for tmpfs compilation
    shm_size: "2gb"
    restart: unless-stopped
